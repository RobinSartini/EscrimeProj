name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read
  checks: write        # To publish the test report
  pull-requests: write # To comment on PRs with code coverage

jobs:
  # ─────────────────────────────────────────────
  # Job 1: .NET Build, Tests & Coverage
  # ─────────────────────────────────────────────
  dotnet-ci:
    name: ".NET 9 — Build, Tests & Coverage"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── .NET SDK ──
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      # ── NuGet Cache ──
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      # ── Restore ──
      - name: Restore dependencies
        run: dotnet restore EscrimeGame.sln

      # ── Build ──
      - name: Build (Release)
        run: dotnet build EscrimeGame.sln --no-restore --configuration Release

      # ── Tests + Coverage (Cobertura format) ──
      - name: Run tests with coverage
        run: >
          dotnet test EscrimeGame.sln
          --no-build
          --configuration Release
          --logger "trx;LogFileName=test-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --
          DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      # ── HTML Report + Markdown Summary via ReportGenerator ──
      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: "TestResults/**/coverage.cobertura.xml"
          targetdir: "TestResults/CoverageReport"
          reporttypes: "HtmlInline;MarkdownSummaryGithub;Cobertura"
          verbosity: "Warning"

      # ── Publish Summary to GitHub Actions Job Summary ──
      - name: Publish coverage to Job Summary
        run: cat TestResults/CoverageReport/SummaryGithub.md >> $GITHUB_STEP_SUMMARY

      # ── Comment PR with coverage delta (if PR) ──
      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          recreate: true
          path: TestResults/CoverageReport/SummaryGithub.md

      # ── Publish Test Results in GitHub UI ──
      - name: Publish test results (.trx)
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: "xUnit Results"
          path: "TestResults/*.trx"
          reporter: dotnet-trx
          fail-on-error: true

      # ── Archive full HTML Report ──
      - name: Archive HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: TestResults/CoverageReport/
          retention-days: 14

  # ─────────────────────────────────────────────
  # Job 2: Frontend Build (Vite / TypeScript)
  # ─────────────────────────────────────────────
  frontend-ci:
    name: "Frontend — TypeScript & Vite Build"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: escrime-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Setup Bun ──
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Install ──
      - name: Install dependencies
        run: bun install --frozen-lockfile

      # ── Typecheck ──
      - name: TypeScript typecheck
        run: bun x tsc --noEmit

      # ── Build ──
      - name: Production build
        run: bun run build
